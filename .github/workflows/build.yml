name: Build Notebooks

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert nbformat ipywidgets

      - name: Build site
        run: |
          rm -rf site
          mkdir -p site

          for nb in notebooks/*/*.ipynb; do
            slug=$(dirname "$nb" | sed 's|notebooks/||')
            out_dir="site/$slug"

            mkdir -p "$out_dir"

            jupyter nbconvert \
              --to html \
              --no-input \
              "$nb" \
              --output notebook.html \
              --output-dir "$out_dir"

            cp "$out_dir/notebook.html" "$out_dir/index.html"
            cp "$nb" "$out_dir/notebook.ipynb"

            py_file="${nb%.ipynb}.py"
            if [ -f "$py_file" ]; then
              cp "$py_file" "$out_dir/notebook.py"
            fi

            if [ -d "notebooks/$slug/assets" ]; then
              cp -r "notebooks/$slug/assets" "$out_dir/"
            fi
          done

      - name: Build homepage
        run: |
          python - << 'PY'
          import os

          slugs = sorted([
              d for d in os.listdir("site")
              if os.path.isdir(os.path.join("site", d))
          ])

          html = [
              "<html><head><meta charset='utf-8'>",
              "<meta name='viewport' content='width=device-width, initial-scale=1'>",
              "<title>AI Case Studies</title>",
              "<style>",
              "body{font-family:system-ui;margin:40px;max-width:1100px}",
              ".card{padding:16px 0;border-bottom:1px solid #eee}",
              ".title{font-size:18px;font-weight:650}",
              ".links a{margin-right:14px}",
              "</style></head><body>",
              "<h1>AI Case Studies</h1>"
          ]

          for slug in slugs:
              title = slug.replace("__"," | ").replace("-"," ").title()
              html.append("<div class='card'>")
              html.append(f"<div class='title'>{title}</div>")
              html.append(
                  f"<a href='./{slug}/'>View</a> | "
                  f"<a href='./{slug}/notebook.ipynb'>Download Notebook</a> | "
                  f"<a href='./{slug}/notebook.py'>Download Python</a>"
              )
              html.append("</div>")

          html.append("</body></html>")

          with open("site/index.html","w") as f:
              f.write("\n".join(html))
          PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
