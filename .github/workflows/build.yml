name: Build Notebooks

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install nbconvert nbformat jupyter

      - name: Install zip utility
        run: sudo apt-get update && sudo apt-get install -y zip

      # Remove broken widget metadata that causes nbconvert errors
      - name: Sanitize notebooks (fix widgets metadata)
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          for nb_path in Path("notebooks").rglob("*.ipynb"):
              if "assets" in nb_path.parts:
                  continue

              try:
                  data = json.loads(nb_path.read_text(encoding="utf-8"))
              except Exception as e:
                  print(f"[SKIP] Could not read JSON: {nb_path} ({e})")
                  continue

              md = data.get("metadata", {})
              widgets = md.get("widgets")

              changed = False
              if isinstance(widgets, dict):
                  key = "application/vnd.jupyter.widget-state+json"

                  if key in widgets and isinstance(widgets[key], dict) and "state" not in widgets[key]:
                      md.pop("widgets", None)
                      data["metadata"] = md
                      changed = True

                  elif key in widgets and not isinstance(widgets[key], dict):
                      md.pop("widgets", None)
                      data["metadata"] = md
                      changed = True

              if changed:
                  nb_path.write_text(
                      json.dumps(data, ensure_ascii=False, indent=1),
                      encoding="utf-8"
                  )
                  print(f"[FIXED] Removed broken widgets metadata: {nb_path}")
          PY

      - name: Build site
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site

          find notebooks -name "*.ipynb" -not -path "*/assets/*" -print0 | while IFS= read -r -d '' nb; do

            slug=$(dirname "$nb" | sed 's|^notebooks/||')
            base_name=$(basename "$nb" .ipynb)

            out_dir="site/$slug"
            mkdir -p "$out_dir"

            # Convert to HTML
            jupyter nbconvert --to html "$nb" --output notebook.html --output-dir "$out_dir"

            # Make nice URL
            cp "$out_dir/notebook.html" "$out_dir/index.html"

            # Copy originals
            cp "$nb" "$out_dir/notebook.ipynb"

            py_file="${nb%.ipynb}.py"
            if [ -f "$py_file" ]; then
              cp "$py_file" "$out_dir/notebook.py"
            fi

            # Copy assets
            if [ -d "notebooks/$slug/assets" ]; then
              cp -r "notebooks/$slug/assets" "$out_dir/"
            fi

            # Create ZIP for downloads
            (
              cd "$out_dir"

              zip -r "${slug}.zip" notebook.html notebook.ipynb notebook.py assets >/dev/null 2>&1 || \
              zip -r "${slug}.zip" notebook.html notebook.ipynb notebook.py >/dev/null 2>&1
            )

          done

          python - << 'PY'
          import os

          base = "https://evagaiml.github.io/000-website-notebooks"
          repo = "EvagAIML/000-website-notebooks"

          slugs = sorted([
              d for d in os.listdir("site")
              if os.path.isdir(os.path.join("site", d))
          ])

          html = [
              "<html><head><meta charset='utf-8'>",
              "<meta name='viewport' content='width=device-width, initial-scale=1'>",
              "<title>AI Case Studies</title>",
              "<style>",
              "body{font-family:system-ui;margin:40px;max-width:1100px}",
              ".card{padding:16px 0;border-bottom:1px solid #eee}",
              ".title{font-size:18px;font-weight:650}",
              ".links a{margin-right:14px}",
              ".meta{color:#555;font-size:13px;margin-top:4px}",
              "</style></head><body>",
              "<h1>AI Case Studies</h1>",
              "<p>View each case study, run it in Colab, or download the artifacts:</p>"
          ]

          with open("site/urls.txt", "w", encoding="utf-8") as f:

              for slug in slugs:

                  view = f"{base}/{slug}/"
                  html_dl = f"{base}/{slug}/notebook.html"
                  ipynb_dl = f"{base}/{slug}/notebook.ipynb"
                  py_dl = f"{base}/{slug}/notebook.py"
                  zip_dl = f"{base}/{slug}/{slug}.zip"

                  colab = f"https://colab.research.google.com/github/{repo}/blob/main/notebooks/{slug}/{slug}.ipynb"

                  title = slug.replace("__", " | ").replace("-", " ").title()

                  html.append("<div class='card'>")
                  html.append(f"<div class='title'>{title}</div>")
                  html.append("<div class='links'>"
                              f"<a href='{view}'>View</a>"
                              f"<a href='{colab}'>Run in Colab</a>"
                              f"<a href='{zip_dl}'>Download Code</a>"
                              f"<a href='{html_dl}' download>Download HTML</a>"
                              f"<a href='{ipynb_dl}' download>Download .ipynb</a>"
                              f"<a href='{py_dl}' download>Download .py</a>"
                              "</div>")
                  html.append(f"<div class='meta'>Slug: {slug}</div>")
                  html.append("</div>")

                  f.write(f"{slug}\n")
                  f.write(f"VIEW: {view}\n")
                  f.write(f"COLAB: {colab}\n")
                  f.write(f"ZIP: {zip_dl}\n")
                  f.write(f"HTML: {html_dl}\n")
                  f.write(f"IPYNB: {ipynb_dl}\n")
                  f.write(f"PY: {py_dl}\n\n")

          html += ["</body></html>"]

          with open("site/index.html", "w", encoding="utf-8") as f:
              f.write("\n".join(html))
          PY

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
